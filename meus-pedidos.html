<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meus pedidos — Printh3D.">
  <title>Meus Pedidos — Printh3D</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" href="assets/imagens/logos/logo_printh_padrão.png">
</head>
<body data-page="orders">

  <!-- ══════════ HEADER ══════════ -->
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="assets/imagens/logos/logo_printh_padrão.png" alt="Printh3D">
      </a>
      <nav class="nav-menu" id="nav-menu">
        <a href="index.html">Home</a>
        <a href="produtos.html">Produtos</a>
        <a href="orcamento.html">Orçamento</a>
        <a href="conta.html" id="auth-link" class="active">Conta</a>
      </nav>
      <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </div>
    </div>
  </header>

  <!-- ══════════ CONTEÚDO ══════════ -->
  <main class="dashboard-page">
    <div class="container">

      <div class="dashboard-header">
        <div class="page-heading">
          <img src="assets/imagens/logos/logo_printh_padrão.png" alt="Printh3D" class="title-logo">
          <h1>Meus Pedidos</h1>
        </div>
        <a href="conta.html" class="btn btn-secondary btn-sm">← Voltar para Conta</a>
      </div>

      <!-- Filtros -->
      <div class="orders-filter">
        <input type="date" id="filter-date" title="Filtrar por data">
        <select id="filter-status">
          <option value="all">Todos os status</option>
          <option value="Enviado">Enviado</option>
          <option value="Em análise">Em análise</option>
          <option value="Finalizado">Finalizado</option>
        </select>
      </div>

      <!-- Lista de Pedidos -->
      <!-- TODO: Substituir por chamada à API — GET /api/orders?userId= -->
      <div id="orders-list">
        <!-- Renderizado via JS -->
      </div>

    </div>
  </main>

  <!-- ══════════ FOOTER ══════════ -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-col">
          <h3>Print<span style="color: var(--blue-primary);">h3D</span></h3>
          <p>Impressão 3D personalizada com qualidade profissional.</p>
        </div>
        <div class="footer-col">
          <h3>Navegação</h3>
          <a href="index.html">Home</a><br>
          <a href="produtos.html">Produtos</a><br>
          <a href="orcamento.html">Orçamento</a>
        </div>
        <div class="footer-col">
          <h3>Contato</h3>
          <p><i class="bi bi-telephone-fill"></i> (13) 99755-3465</p>
          <p><i class="bi bi-envelope-fill"></i> contato@printh3d.com</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Printh3D — Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/whatsapp.js"></script>
  <script src="js/products.js"></script>
  <script src="js/budget.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
